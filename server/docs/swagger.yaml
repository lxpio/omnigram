host: localhost:9527
info:
  contact: {}
  description: Omnigram - AI-native self-hosted book library management service
  title: Omnigram API
  version: 0.1.0
paths:
  /admin/accounts:
    get:
      description: List all user accounts (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              items:
                items:
                  $ref: '#/definitions/schema.User'
                type: array
              total:
                type: integer
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: List accounts
      tags:
      - Admin
    post:
      consumes:
      - application/json
      description: Create a new user account (admin only)
      parameters:
      - description: Account details
        in: body
        name: request
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
            user_name:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/schema.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Create account
      tags:
      - Admin
  /admin/accounts/{user_id}:
    delete:
      description: Delete a user account (admin only, cannot delete self)
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Delete account
      tags:
      - Admin
    get:
      description: Get a specific user account by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/schema.User'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Get account details
      tags:
      - Admin
  /auth/accounts/{user_id}/apikeys:
    get:
      description: Get all API keys for a user
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/schema.APIToken'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - Auth
    post:
      description: Generate a new API key for the authenticated user
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/schema.APIToken'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Create API key
      tags:
      - Auth
  /auth/accounts/{user_id}/apikeys/{key_id}:
    delete:
      description: Delete an existing API key
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      - description: API Key ID
        in: path
        name: key_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Delete API key
      tags:
      - Auth
  /auth/accounts/{user_id}/reset:
    post:
      consumes:
      - application/json
      description: Reset user password (self or admin)
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      - description: New password
        in: body
        name: request
        required: true
        schema:
          properties:
            code:
              type: string
            new_password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Reset password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with account credentials, sets session cookie on success
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          properties:
            account:
              type: string
            client_id:
              type: string
            grant_type:
              type: string
            password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      summary: User login
      tags:
      - Auth
  /auth/logout:
    post:
      description: Logout current session and clear cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - Auth
  /auth/token:
    post:
      consumes:
      - application/json
      description: Authenticate and get a Bearer access token
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          properties:
            account:
              type: string
            device_id:
              type: string
            grant_type:
              type: string
            password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              access_token:
                type: string
              expired_in:
                type: integer
              refresh_token:
                type: string
              token_type:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Get access token
      tags:
      - Auth
  /auth/token/refresh:
    post:
      consumes:
      - application/json
      description: Refresh an expired access token using a refresh token
      parameters:
      - description: Refresh token request
        in: body
        name: request
        required: true
        schema:
          properties:
            account:
              type: string
            device_id:
              type: string
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              access_token:
                type: string
              expired_in:
                type: integer
              refresh_token:
                type: string
              token_type:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Refresh access token
      tags:
      - Auth
  /img/covers/{book_cover_path}:
    get:
      description: Retrieve a book cover image by path
      parameters:
      - description: Cover image path
        in: path
        name: book_cover_path
        required: true
        type: string
      produces:
      - image/jpeg
      responses:
        "200":
          description: Cover image
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Get book cover image
      tags:
      - Reader
  /opds:
    get:
      description: Get the OPDS root catalog feed
      produces:
      - application/atom+xml
      responses:
        "200":
          description: OPDS Atom feed
          schema:
            type: string
      summary: OPDS root catalog
      tags:
      - OPDS
  /opds/authors:
    get:
      description: Get all authors as OPDS navigation feed
      produces:
      - application/atom+xml
      responses:
        "200":
          description: OPDS Atom feed
          schema:
            type: string
      summary: OPDS authors list
      tags:
      - OPDS
  /opds/authors/{name}:
    get:
      description: Get books by a specific author as OPDS feed
      parameters:
      - description: Author name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/atom+xml
      responses:
        "200":
          description: OPDS Atom feed
          schema:
            type: string
      summary: OPDS books by author
      tags:
      - OPDS
  /opds/download/{book_id}:
    get:
      description: Download a book file via OPDS
      parameters:
      - description: Book ID
        in: path
        name: book_id
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Book file
          schema:
            type: file
      summary: OPDS download book
      tags:
      - OPDS
  /opds/new:
    get:
      description: Get recently added books as OPDS feed
      produces:
      - application/atom+xml
      responses:
        "200":
          description: OPDS Atom feed
          schema:
            type: string
      summary: OPDS new books
      tags:
      - OPDS
  /opds/popular:
    get:
      description: Get popular books as OPDS feed
      produces:
      - application/atom+xml
      responses:
        "200":
          description: OPDS Atom feed
          schema:
            type: string
      summary: OPDS popular books
      tags:
      - OPDS
  /opds/search:
    get:
      description: Search books via OPDS feed
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/atom+xml
      responses:
        "200":
          description: OPDS Atom feed
          schema:
            type: string
      summary: OPDS search
      tags:
      - OPDS
  /opds/shelves:
    get:
      description: Get all shelves as OPDS navigation feed
      produces:
      - application/atom+xml
      responses:
        "200":
          description: OPDS Atom feed
          schema:
            type: string
      summary: OPDS shelves list
      tags:
      - OPDS
  /opds/shelves/{shelf_id}:
    get:
      description: Get books in a specific shelf as OPDS feed
      parameters:
      - description: Shelf ID
        in: path
        name: shelf_id
        required: true
        type: integer
      produces:
      - application/atom+xml
      responses:
