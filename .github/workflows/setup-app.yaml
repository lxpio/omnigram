name: Setup App Environment

on:
  workflow_call:
    secrets:
      NOTIFICATION_URL:
        required: false
    outputs:
      tag:
        description: "Git tag"
        value: ${{ jobs.setup.outputs.tag }}
      version:
        description: "Version string"
        value: ${{ jobs.setup.outputs.version }}
      build_number:
        description: "Auto-incremented build number"
        value: ${{ jobs.setup.outputs.build_number }}
      is_alpha:
        description: "Is alpha release"
        value: ${{ jobs.setup.outputs.is_alpha }}
      is_beta:
        description: "Is beta release"
        value: ${{ jobs.setup.outputs.is_beta }}
      release_notes:
        description: "Release notes"
        value: ${{ jobs.setup.outputs.release_notes }}
      flutter_version:
        description: "Flutter SDK version"
        value: ${{ jobs.setup.outputs.flutter_version }}
      xcode_version:
        description: "Xcode version"
        value: ${{ jobs.setup.outputs.xcode_version }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_version.outputs.tag }}
      version: ${{ steps.get_version.outputs.version }}
      build_number: ${{ steps.get_version.outputs.build_number }}
      is_alpha: ${{ steps.get_version.outputs.is_alpha }}
      is_beta: ${{ steps.get_version.outputs.is_beta }}
      release_notes: ${{ steps.extract_release_notes.outputs.release_notes }}
      flutter_version: ${{ steps.get_flutter_version.outputs.flutter_version }}
      xcode_version: ${{ steps.get_xcode_version.outputs.xcode_version }}

    steps:
      - name: Send build start notification
        shell: bash
        env:
          NOTIFICATION_URL: ${{ secrets.NOTIFICATION_URL }}
        run: |
          if [ -n "$NOTIFICATION_URL" ]; then
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            BASE_NOTIFICATION_URL="${NOTIFICATION_URL}/Omnigram%20Action"
            curl -s "$BASE_NOTIFICATION_URL/Build%20Started?url=$RUN_URL&level=timeSensitive&icon=https://github.githubassets.com/assets/GitHub-Mark-ea2971cee799.png" || echo "Notification failed, continuing..."
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Flutter version
        id: get_flutter_version
        run: |
          FLUTTER_VERSION=3.41.5
          echo "flutter_version=${FLUTTER_VERSION}" >> $GITHUB_OUTPUT

      - name: Read Xcode version
        id: get_xcode_version
        run: |
          XCODE_VERSION=26.2
          echo "xcode_version=${XCODE_VERSION}" >> $GITHUB_OUTPUT

      - name: Get version from tag and determine release type
        id: get_version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

          PUBSPEC_VERSION=$( grep '^version:' app/pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1 )

          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-alpha\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            PRE_BUILD="${BASH_REMATCH[2]}"
            echo "is_alpha=true" >> $GITHUB_OUTPUT
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "version=${BASE_VERSION}-alpha.${PRE_BUILD}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-beta\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            PRE_BUILD="${BASH_REMATCH[2]}"
            echo "is_alpha=false" >> $GITHUB_OUTPUT
            echo "is_beta=true" >> $GITHUB_OUTPUT
            echo "version=${BASE_VERSION}-beta.${PRE_BUILD}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            echo "is_alpha=false" >> $GITHUB_OUTPUT
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "::error::Unsupported tag format: ${TAG}" >&2
            exit 1
          fi

          if [[ "${BASE_VERSION}" != "${PUBSPEC_VERSION}" ]]; then
            echo "::warning::Tag version ${BASE_VERSION} does not match pubspec version ${PUBSPEC_VERSION}" >&2
          fi

          # Auto-increment build number: base from pubspec + run_number offset
          PUBSPEC_BUILD=$( grep '^version:' app/pubspec.yaml | awk '{print $2}' | cut -d '+' -f 2 )
          BUILD_NUMBER=$(( PUBSPEC_BUILD + ${{ github.run_number }} ))
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "Build number: ${BUILD_NUMBER} (pubspec base: ${PUBSPEC_BUILD} + run: ${{ github.run_number }})"

      - name: Extract release notes
        id: extract_release_notes
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          MAIN_VERSION=${VERSION%%-*}
          CHANGELOG_CONTENT=$(sed -n "/## $MAIN_VERSION/,/## /p" app/assets/CHANGELOG.md | sed '$d')
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash
