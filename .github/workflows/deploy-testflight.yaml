name: Deploy to TestFlight

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      flutter_version:
        required: true
        type: string
      xcode_version:
        required: true
        type: string
      build_number:
        required: false
        type: string
    secrets:
      IOS_CERTIFICATE_BASE64:
        required: true
      IOS_CERTIFICATE_PASSWORD:
        required: true
      IOS_PROVISION_PROFILE_BASE64:
        required: true
      IOS_SHARE_EXT_PROFILE_BASE64:
        required: true
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      ASC_KEY_P8_BASE64:
        required: true

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 40
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ inputs.flutter_version }}

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_${{ inputs.xcode_version }}.app/Contents/Developer

      - name: Install signing certificate
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Install Apple WWDR intermediate certificates (required for distribution cert chain)
          # || true: ignore "already exists" errors on runners that have them pre-installed
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o $RUNNER_TEMP/AppleWWDRCAG3.cer
          sudo security import $RUNNER_TEMP/AppleWWDRCAG3.cer -k /Library/Keychains/System.keychain -T /usr/bin/codesign || true
          curl -sL https://www.apple.com/certificateauthority/AppleRootCA-G3.cer -o $RUNNER_TEMP/AppleRootCA-G3.cer
          sudo security import $RUNNER_TEMP/AppleRootCA-G3.cer -k /Library/Keychains/System.keychain -T /usr/bin/codesign || true

          # Import distribution certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify the identity was imported correctly
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install provisioning profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Files must be named {UUID}.mobileprovision for xcodebuild to find them
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/9c2c4458-4e80-415d-93c3-d5c049df0f68.mobileprovision
          echo "${{ secrets.IOS_SHARE_EXT_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/c115e061-3135-4dc3-b54e-c5614437aabe.mobileprovision

      - name: Create App Store Connect API key file
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          # Xcode needs this env var to find the API key for automatic signing
          echo "APP_STORE_CONNECT_API_KEY_KEY_ID=${{ secrets.ASC_KEY_ID }}" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_API_KEY_ISSUER_ID=${{ secrets.ASC_ISSUER_ID }}" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_API_KEY_KEY=$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" >> $GITHUB_ENV

      - name: Install dependencies & codegen
        run: |
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS archive
        run: |
          BUILD_NUM_FLAG=""
          if [ -n "${{ inputs.build_number }}" ]; then
            BUILD_NUM_FLAG="--build-number=${{ inputs.build_number }}"
          fi
          flutter build ios --release --no-codesign $BUILD_NUM_FLAG

      - name: Sign and export IPA
        run: |
          cd ios
          # Archive without code signing — exportArchive will re-sign with distribution cert
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            archive

          # Export and sign IPA using manual profiles specified in ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/*.ipa \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12
          rm -rf ../private_keys
