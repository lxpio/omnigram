name: Test App

on:
  pull_request:
    paths:
      - 'app/**'
  push:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        # Gate on errors + warnings only. Info-level lints (use_null_aware_elements,
        # deprecated_member_use from Flutter SDK churn, unnecessary_underscores, etc.)
        # are cleanup noise, not merge blockers — the repo has ~80 of them from
        # upstream Anx Reader heritage. Warnings stay fatal so real bugs like
        # unused_element/unused_local_variable still block.
        run: flutter analyze --no-fatal-infos lib/

      - name: Test
        run: flutter test --no-pub
