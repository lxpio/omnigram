name: API Smoke Test

on:
  workflow_call:
    inputs:
      flutter_version:
        required: false
        type: string
    secrets:
      GCP_SA_KEY:
        required: false

  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'app/lib/service/api/**'
      - 'app/lib/models/server/**'
      - 'app/integration_test/**'
      - '.github/docker-compose.test.yml'

jobs:
  api-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install hurl
        run: |
          VERSION=6.1.1
          curl -fsSL "https://github.com/Orange-OpenSource/hurl/releases/download/${VERSION}/hurl_${VERSION}_amd64.deb" -o hurl.deb
          sudo dpkg -i hurl.deb

      - name: Start services
        run: |
          docker compose -f .github/docker-compose.test.yml up -d --build
          echo "Waiting for server to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Server is ready after $((i*2)) seconds"
              exit 0
            fi
            # Show container status every 10 iterations
            if [ $((i % 10)) -eq 0 ]; then
              echo "--- Container status at iteration $i ---"
              docker compose -f .github/docker-compose.test.yml ps
              docker compose -f .github/docker-compose.test.yml logs --tail=5 omnigram-server 2>&1 || true
            fi
            sleep 2
          done
          echo "ERROR: Server failed to start within 120 seconds"
          docker compose -f .github/docker-compose.test.yml logs omnigram-server
          exit 1

      - name: Run smoke tests
        run: |
          hurl --test \
            --variable host=http://localhost:8080 \
            --variable account=testadmin \
            --variable password=testpass123 \
            --report-html server/test/results/ \
            --retry 2 \
            --retry-interval 3000 \
            server/test/api/smoke.hurl

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ inputs.flutter_version || '3.41.4' }}

      - name: Run Dart API integration tests
        working-directory: app
        env:
          OMNIGRAM_TEST_URL: http://localhost:8080
          OMNIGRAM_TEST_USER: testadmin
          OMNIGRAM_TEST_PASS: testpass123
        run: |
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs
          dart test integration_test/api_integration_test.dart --reporter expanded

      - name: Run schemathesis fuzz (optional)
        if: always()
        continue-on-error: true
        run: |
          pip install schemathesis
          schemathesis run \
            http://localhost:8080/swagger/doc.json \
            --checks all \
            --url http://localhost:8080 \
            --header "Authorization: Bearer $(curl -s http://localhost:8080/auth/token -H 'Content-Type: application/json' -d '{"account":"testadmin","password":"testpass123"}' | jq -r '.access_token')" \
            --max-response-time 5000 \
            --hypothesis-max-examples 50 \
            --report \
            || true

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f .github/docker-compose.test.yml logs > server-logs.txt 2>&1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            server/test/results/
            server-logs.txt
          retention-days: 14

      - name: Cleanup
        if: always()
        run: docker compose -f .github/docker-compose.test.yml down -v
