version: '3'
services:
  omnigram-server:
    image: lxpio/omnigram-server:latest
    ports:
      - "8080:80"
    volumes:
      - ./books:/docs
      - ./data:/metadata        # ⚠️ Persistent data — do NOT delete on upgrade/migration
    environment:
      TTS_PROVIDER: kokoro                    # kokoro | edge | openai
      TTS_SIDECAR_URL: http://tts:8880        # Sidecar container address
      TTS_TIMEOUT: 120s                       # Synthesis timeout
      # TTS_OPENAI_API_KEY: sk-xxx            # Only if using OpenAI TTS proxy
    depends_on:
      tts:
        condition: service_healthy

  # Kokoro TTS Sidecar (CPU/GPU, default choice)
  # Image size: CPU ~5GB, GPU ~8-12GB — first pull may take a while
  tts:
    image: ghcr.io/remsky/kokoro-fastapi:latest
    # CPU mode by default. For GPU acceleration, uncomment below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Model loading takes 30-60s

  # ── Alternative GPU engines (uncomment ONE to replace Kokoro above) ──
  #
  # Qwen3-TTS 1.7B — Best Chinese quality, 10 languages, OpenAI-compatible API
  # Requires GPU with 6GB+ VRAM. See: https://github.com/groxaxo/Qwen3-TTS-Openai-Fastapi
  # tts:
  #   image: groxaxo/qwen3-tts-openai:latest
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 120s  # Large model loading
  #
  # Chatterbox Turbo — Lightweight GPU (4GB VRAM), 23 languages, MIT license
  # See: https://github.com/resemble-ai/chatterbox
  # tts:
  #   image: resemble-ai/chatterbox:latest
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 90s
