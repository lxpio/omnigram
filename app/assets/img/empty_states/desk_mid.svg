<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Desk surface -->
  <rect x="20" y="150" width="160" height="8" rx="4" fill="#F5E6E8" stroke="#E8B4B8" stroke-width="2"/>
  <!-- Book left page -->
  <path d="M55 145 Q70 80 100 75" stroke="#E8B4B8" stroke-width="2.5" stroke-linecap="round" fill="#FDF0F1" fill-opacity="0.4"/>
  <!-- Book right page -->
  <path d="M145 145 Q130 80 100 75" stroke="#C4B8E0" stroke-width="2.5" stroke-linecap="round" fill="#F0EDF8" fill-opacity="0.4"/>
  <!-- Book spine -->
  <line x1="100" y1="75" x2="100" y2="148" stroke="#D4A8C0" stroke-width="2" stroke-linecap="round"/>
  <!-- Book cover base -->
  <path d="M55 145 Q100 148 145 145" stroke="#E8B4B8" stroke-width="2" stroke-linecap="round"/>
  <!-- Text lines on left page -->
  <line x1="68" y1="110" x2="90" y2="108" stroke="#E8B4B8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="66" y1="118" x2="92" y2="116" stroke="#E8B4B8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="126" x2="91" y2="124" stroke="#E8B4B8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Text lines on right page -->
  <line x1="108" y1="108" x2="130" y2="110" stroke="#C4B8E0" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="108" y1="116" x2="132" y2="118" stroke="#C4B8E0" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="109" y1="124" x2="133" y2="126" stroke="#C4B8E0" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Lamp pole -->
  <line x1="155" y1="150" x2="155" y2="95" stroke="#B8D4C8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lamp arm -->
  <path d="M155 95 Q145 90 135 95" stroke="#B8D4C8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Lamp shade -->
  <path d="M125 95 Q130 88 135 95 Z" fill="#B8D4C8" fill-opacity="0.5" stroke="#B8D4C8" stroke-width="2" stroke-linejoin="round"/>
  <!-- Warm glow circle -->
  <circle cx="130" cy="100" r="18" fill="#FFF9E6" fill-opacity="0.5"/>
  <!-- Small bookmark -->
  <rect x="96" y="72" width="5" height="12" rx="1" fill="#E8B4B8" opacity="0.7"/>
  <path d="M96 84 L98.5 82 L101 84" fill="#E8B4B8" opacity="0.7"/>
  <!-- Coffee cup -->
  <rect x="30" y="135" width="18" height="14" rx="4" fill="#F5E6E8" stroke="#E8B4B8" stroke-width="1.5"/>
  <path d="M48 139 Q53 139 53 143 Q53 147 48 147" stroke="#E8B4B8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Steam -->
  <path d="M35 133 Q37 129 35 125" stroke="#E8B4B8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M40 132 Q42 128 40 124" stroke="#E8B4B8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
