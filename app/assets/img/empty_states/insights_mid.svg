  <!-- Tiny star/sparkle top left -->
  <path d="M50 70 L51.5 73 L55 73 L52.5 75 L53.5 78.5 L50 76.5 L46.5 78.5 L47.5 75 L45 73 L48.5 73 Z" fill="#E8B4B8" fill-opacity="0.4" stroke="#E8B4B8" stroke-width="0.5"/>
